</head>

  <body>
    <!-- Splash Screen (outside #root so React doesn't wipe it) -->
    <div id="splash-screen" style="
      position: fixed; inset: 0; z-index: 9999;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      background: linear-gradient(135deg, hsl(36 90% 48%), hsl(25 95% 53%));
    ">
      <img src="/favicon.png" alt="Vyapaaro" style="
        width: 72px; height: 72px; border-radius: 16px; object-fit: contain;
        animation: splash-pulse 1.2s ease-in-out infinite;
      " />
      <div style="
        margin-top: 20px; width: 36px; height: 36px;
        border: 3px solid rgba(255,255,255,0.3);
        border-top-color: #fff; border-radius: 50%;
        animation: splash-spin 0.8s linear infinite;
      "></div>
    </div>
    <style>
      @keyframes splash-spin { to { transform: rotate(360deg); } }
      @keyframes splash-pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.08); } }
    </style>
    <script>
      // Fallback: remove splash after 4s even if React hasn't mounted
      setTimeout(function() {
        var s = document.getElementById('splash-screen');
        if (s) { s.style.transition = 'opacity 0.4s ease'; s.style.opacity = '0'; setTimeout(function() { if (s.parentNode) s.parentNode.removeChild(s); }, 400); }
      }, 4000);
    </script>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
